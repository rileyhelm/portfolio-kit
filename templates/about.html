{% extends "base.html" %}

{% block page_class %}page-about{% endblock %}

{% block content %}
<section class="about-layout">
  {% if settings.about_photo %}
  <figure class="about-photo-frame">
    <img src="{{ settings.about_photo }}" alt="{{ settings.owner_name }}" loading="eager" decoding="async">
  </figure>
  {% endif %}
  <div class="about-copy">
    <p class="eyebrow">About</p>
    <h1>{{ settings.owner_name }}</h1>
    {% if about_content %}
    <div class="rich-content">
      {{ about_content | escape_jinja2_in_code_snippets | safe }}
    </div>
    {% endif %}
  </div>
</section>
{% endblock %}
